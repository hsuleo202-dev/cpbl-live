name: CPBL Auto Sync Monitor

on:
  schedule:
    # 透過 Cron 運算式設定每分鐘執行一次
    - cron: '*/1 * * * *'
  workflow_dispatch: # 允許在 GitHub 頁面上手動強制觸發

# 核心安全機制：若前一次的任務尚未結束，直接取消新任務，防止併發衝突
concurrency:
  group: cpbl-live-sync
  cancel-in-progress: false

jobs:
  sync-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Execute Live Data Cleaning (1.py)
      run: python 1.py

    - name: Commit and Push to GitHub Repository
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        # 檢查 cpbl.json 檔案內容是否有本質變更
        if git status --porcelain | grep -q "cpbl.json"; then
          git add cpbl.json
          git commit -m "🤖 自動更新賽況數據: $(date '+%Y-%m-%d %H:%M:%S')"
          git push
          print("🚀 檢測到數據異動，已成功推送至 GitHub Pages。")
        else
          print("☕ 數據無實質變更，跳過本次 Commit。")
        fi
