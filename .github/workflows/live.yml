name: CPBL Live Update

# 設定觸發條件
on:
  schedule:
    - cron: '* * * * *' # 關鍵修改：改為每 1 分鐘自動啟動一次
  workflow_dispatch:      # 允許手動強制執行

jobs:
  update-live-data:
    runs-on: ubuntu-latest

    steps:
    - name: 檢查專案原始碼
      uses: actions/checkout@v4

    - name: 設定 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 安裝網路請求必備套件
      run: |
        pip install requests

    - name: 執行 CPBL 自動化爬蟲資料清洗
      run: |
        python 1.py

    - name: 自動將清洗後的 cpbl.json 自動推回 GitHub 儲存庫
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add cpbl.json
        # 檢查檔案有沒有變更，有變更才推，防止沒有比賽時刷無效的 Commit
        git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 自動更新即時賽況比分" && git push)
